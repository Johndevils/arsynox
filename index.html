<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kira Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0;padding:0;box-sizing:border-box; }
        :root {
            --accent:#C15F3C; --accent-glow:rgba(193,95,60,0.35); --accent-soft:rgba(193,95,60,0.12);
            --muted-soft:rgba(177,173,161,0.15);
            --bg:#0a0a0f; --surface:rgba(255,255,255,0.045); --surface-hover:rgba(255,255,255,0.075);
            --border:rgba(255,255,255,0.08); --border-accent:rgba(193,95,60,0.3);
            --text-1:#f0ede8; --text-2:#9a9690; --text-3:#5a5652;
            --glass-blur:blur(18px) saturate(180%);
            --radius-sm:10px; --radius-md:16px; --radius-lg:22px; --radius-xl:32px;
            --ease-spring:cubic-bezier(0.34,1.56,0.64,1); --ease-out:cubic-bezier(0.16,1,0.3,1);
        }
        @media (prefers-color-scheme:light) {
            :root {
                --bg:#f2ede8; --surface:rgba(255,255,255,0.6); --surface-hover:rgba(255,255,255,0.85);
                --border:rgba(0,0,0,0.08); --text-1:#1a1714; --text-2:#6b6560; --text-3:#a09890;
            }
        }
        html{height:100%}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;overflow-x:hidden;}
        /* BG */
        .bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
        .mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:orbFloat 20s ease-in-out infinite;}
        @media(prefers-color-scheme:light){.mesh-orb{opacity:0.22;}}
        .orb-1{width:600px;height:600px;background:radial-gradient(circle,#C15F3C,transparent 70%);top:-15%;left:-10%;animation-duration:25s;}
        .orb-2{width:500px;height:500px;background:radial-gradient(circle,#7c4a8a,transparent 70%);top:20%;right:-15%;animation-duration:30s;animation-delay:-8s;}
        .orb-3{width:400px;height:400px;background:radial-gradient(circle,#3c6ec1,transparent 70%);bottom:10%;left:30%;animation-duration:22s;animation-delay:-15s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.05)}66%{transform:translate(-20px,40px) scale(0.95)}}
        /* LAYOUT */
        .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 24px 40px;}
        /* HEADER */
        .site-header{width:100%;max-width:860px;display:flex;justify-content:space-between;align-items:center;padding:28px 0 0;opacity:0;animation:slideDown 0.6s var(--ease-out) 0.1s forwards;}
        .brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);}
        .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
        .header-time{font-family:'DM Mono',monospace;font-size:0.88rem;color:var(--text-2);letter-spacing:0.05em;}
        .header-date{font-family:'DM Sans',sans-serif;font-size:0.72rem;color:var(--text-3);}
        /* HERO */
        .hero{width:100%;max-width:720px;margin-top:clamp(60px,10vh,120px);display:flex;flex-direction:column;align-items:center;gap:28px;opacity:0;animation:fadeUp 0.7s var(--ease-out) 0.25s forwards;}
        .hero-greeting{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;text-align:center;line-height:1.15;}
        .hero-greeting span{color:var(--accent);}
        /* SEARCH */
        .search-wrap{width:100%;position:relative;}
        .search-glass{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);display:flex;align-items:center;padding:6px 6px 6px 18px;gap:12px;transition:border-color 0.25s,box-shadow 0.25s;}
        .search-glass:focus-within{border-color:var(--border-accent);box-shadow:0 0 0 3px var(--accent-soft),0 8px 32px rgba(0,0,0,0.3);}
        .search-engine-icon{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--accent);}
        .search-engine-icon svg{width:18px;height:18px;}
        #searchInput{flex:1;background:transparent;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:1.05rem;color:var(--text-1);padding:14px 0;caret-color:var(--accent);}
        #searchInput::placeholder{color:var(--text-3);}
        .search-submit{width:46px;height:46px;border-radius:calc(var(--radius-xl) - 8px);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;}
        .search-submit:hover{transform:scale(1.08);box-shadow:0 4px 20px var(--accent-glow);}
        .search-submit svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
        /* ENGINE CHIPS */
        .engine-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
        .engine-chip{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:500;cursor:pointer;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);transition:all 0.2s var(--ease-out);white-space:nowrap;}
        .engine-chip:hover{background:var(--surface-hover);color:var(--text-1);}
        .engine-chip.active{background:var(--accent-soft);border-color:var(--border-accent);color:var(--accent);}
        .engine-chip svg{width:14px;height:14px;flex-shrink:0;}
        /* SHORTCUTS */
        .shortcuts-section{width:100%;max-width:860px;margin-top:48px;opacity:0;animation:fadeUp 0.7s var(--ease-out) 0.45s forwards;}
        .section-label{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;padding-left:2px;}
        .shortcut-group{display:flex;gap:8px;flex-wrap:wrap;}
        .shortcut-btn{display:flex;align-items:center;gap:9px;padding:10px 16px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;text-decoration:none;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);transition:all 0.2s var(--ease-out);position:relative;overflow:hidden;}
        .shortcut-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-soft),transparent);opacity:0;transition:opacity 0.2s;}
        .shortcut-btn:hover{background:var(--surface-hover);border-color:var(--border-accent);color:var(--text-1);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.25);}
        .shortcut-btn:hover::before{opacity:1;}
        .shortcut-btn:active{transform:scale(0.97) translateY(0);}
        .s-ico{width:16px;height:16px;flex-shrink:0;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;color:var(--accent);}
        .s-ico svg{width:15px;height:15px;}
        .s-lbl{position:relative;z-index:1;}
        .s-letter{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;color:var(--accent);position:relative;z-index:1;width:16px;text-align:center;}
        .group-divider{width:1px;align-self:stretch;background:var(--border);margin:0 4px;}
        /* PRODUCTIVITY */
        .productivity{width:100%;max-width:860px;margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px;opacity:0;animation:fadeUp 0.7s var(--ease-out) 0.6s forwards;}
        @media(max-width:600px){.productivity{grid-template-columns:1fr;}}
        .glass-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);padding:22px;position:relative;overflow:hidden;}
        .glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);}
        /* CLOCK */
        .clock-card{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:4px;}
        .clock-label{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);}
        #clock{font-family:'DM Mono',monospace;font-size:clamp(2rem,4vw,2.8rem);font-weight:500;color:var(--text-1);letter-spacing:0.02em;line-height:1;margin:8px 0 6px;}
        #clock .colon{color:var(--accent);animation:blink 1s step-end infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        #date-display{font-size:0.82rem;color:var(--text-2);}
        /* TODO */
        .todo-card{display:flex;flex-direction:column;gap:14px;}
        .card-header{display:flex;justify-content:space-between;align-items:center;}
        .card-title{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.05em;color:var(--text-1);text-transform:uppercase;}
        .todo-count{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-3);background:var(--muted-soft);padding:2px 8px;border-radius:999px;}
        .todo-input-row{display:flex;gap:8px;}
        .todo-input-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--text-1);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
        @media(prefers-color-scheme:light){.todo-input-row input{background:rgba(0,0,0,0.04);}}
        .todo-input-row input:focus{border-color:var(--border-accent);box-shadow:0 0 0 2px var(--accent-soft);}
        .todo-input-row input::placeholder{color:var(--text-3);}
        .todo-add-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;}
        .todo-add-btn:hover{transform:scale(1.1);box-shadow:0 4px 16px var(--accent-glow);}
        .todo-add-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;}
        .todo-list{list-style:none;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
        .todo-list::-webkit-scrollbar{width:4px;}
        .todo-list::-webkit-scrollbar-track{background:transparent;}
        .todo-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
        .todo-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);transition:background 0.15s;}
        .todo-item:hover{background:var(--surface-hover);}
        .todo-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s var(--ease-spring);}
        .todo-check.done{background:var(--accent);border-color:var(--accent);}
        .todo-check.done::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
        .todo-text{flex:1;font-size:0.83rem;color:var(--text-2);transition:all 0.2s;}
        .todo-item.done .todo-text{text-decoration:line-through;color:var(--text-3);}
        .todo-del{width:22px;height:22px;border-radius:5px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-3);opacity:0;transition:all 0.15s;}
        .todo-item:hover .todo-del{opacity:1;}
        .todo-del:hover{background:rgba(255,80,80,0.12);color:#ff6060;}
        .todo-del svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;}
        .todo-empty{font-size:0.8rem;color:var(--text-3);text-align:center;padding:16px 0;font-style:italic;}
        /* FOOTER */
        .site-footer{margin-top:auto;padding-top:40px;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;color:var(--text-3);text-transform:uppercase;opacity:0;animation:fadeUp 0.6s var(--ease-out) 0.8s forwards;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
        ::selection{background:var(--accent-soft);color:var(--accent);}
    </style>
</head>

<div class="page">

<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchInput').focus();

    // Greeting
    const h = new Date().getHours();
    const g = h<5?'Good night':h<12?'Good morning':h<17?'Good afternoon':h<21?'Good evening':'Good night';
    document.getElementById('greeting').innerHTML = `${g}, <span>Kira</span>`;

    // Clock → header only
    function tick() {
        const n = new Date(), p = x => String(x).padStart(2,'0');
        document.getElementById('headerTime').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
        document.getElementById('headerDate').textContent =
            n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    }
    tick(); setInterval(tick,1000);

    // Engine switcher
    let currentUrl = 'https://www.google.com/search?q=';
    document.querySelectorAll('#engineSwitcher .engine-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            document.querySelectorAll('#engineSwitcher .engine-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            currentUrl = chip.dataset.url;
            document.getElementById('engineIcon').innerHTML = `<svg><use href="#${chip.dataset.icon}"/></svg>`;
            document.getElementById('searchInput').focus();
        });
    });

    // Search
    const go = () => {
        const q = document.getElementById('searchInput').value.trim();
        if (q) window.open(currentUrl + encodeURIComponent(q), '_blank');
    };
    document.getElementById('searchSubmit').addEventListener('click', go);
    document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') go(); });

    // Todo
    let todos = JSON.parse(localStorage.getItem('arynox-todos')||'[]');
    const save = () => localStorage.setItem('kira-todos', JSON.stringify(todos));

    function render() {
        const list = document.getElementById('todoList');
        const count = document.getElementById('todoCount');
        count.textContent = todos.length===0 ? '0 tasks' : `${todos.filter(t=>!t.done).length}/${todos.length}`;
        if (!todos.length) { list.innerHTML='<li class="todo-empty">No tasks yet — add one above</li>'; return; }
        list.innerHTML = '';
        todos.forEach((t,i) => {
            const li = document.createElement('li');
            li.className = `todo-item${t.done?' done':''}`;
            li.innerHTML = `
                <div class="todo-check${t.done?' done':''}"></div>
                <div class="todo-text">${t.text.replace(/</g,'&lt;')}</div>
                <button class="todo-del" aria-label="Delete"><svg><use href="#i-x"/></svg></button>`;
            li.querySelector('.todo-check').onclick = () => { todos[i].done=!todos[i].done; save(); render(); };
            li.querySelector('.todo-del').onclick   = () => { todos.splice(i,1); save(); render(); };
            list.appendChild(li);
        });
    }

    function add() {
        const inp = document.getElementById('todoInput');
        const text = inp.value.trim();
        if (!text) return;
        todos.push({text,done:false});
        save(); render();
        inp.value=''; inp.focus();
    }

    document.getElementById('addTodoBtn').addEventListener('click', add);
    document.getElementById('todoInput').addEventListener('keydown', e => { if(e.key==='Enter') add(); });
    render();
});
</script>
